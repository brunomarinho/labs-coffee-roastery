# Descrição e Notas
description: >
  Pamonha e milho no aroma — nítido desde o primeiro segundo. Na boca, frutas amarelas com um fundo de melaço e mel que lembra garapa. Quando esfria, vira outro café: chá preto, Earl Grey, um toque herbal que surpreende. É um café exótico, licoroso, que não é pra todo mundo — mas quem gosta, gosta muito. Processo vulcão com 69 horas de fermentação lenta, alternando entre amontado e esparramado. Não é um natural convencional.
notas: "Acidez Média, Pamonha, Exótico"

