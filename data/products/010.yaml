# Descrição e Notas
description: >
  **O mesmo café torrado de três formas diferentes. Três expressões
  completamente distintas na xícara.**


  Cada pacote de 70g é torrado em um nível de desenvolvimento
  diferente — do mais cru e suculento ao mais encorpado e
  desenvolvido. A caixa inclui um guia com sugestões para você
  provar lado a lado e descobrir como diferentes tempos de torra
  mudam tudo: aroma, acidez, corpo, sabor.


  **Nível 1 — Pré-crack**. Cru e suculento, acidez viva, textura
  de chá. O terroir sem filtro.


  **Nível 2 — Ponto ideal**. Acidez vibrante, frutas vermelhas
  nítidas.


  **Nível 3 — Desenvolvido**. Mais corpo, menos acidez, notas
  tostadas.
notas: Educativo, Comparativo, Frutas Vermelhas

