# Descrição e Notas
description: >
  Abacaxi no primeiro gole — acidez viva, quase carbonatada, que abre pra uma suculência intensa. Caramelo salgado e melaço no fundo, com finalização longa que puxa pra uma nota alcoólica/fermentada sutil. Corpo leve, xícara limpa, muito fácil de beber. Café safra 2024 de um lote que acabou se perdendo no estoque por quase um ano. O verde perdeu umidade com o tempo, então então fui com uma torra ainda mais curta — o perfil ficou mais suave que o original, mas a suculência e a doçura sobreviveram. Só 2 pacotes disponíveis.
